# packages/mcp-server/fixtures/multi-step-workflow.yaml
# Test fixture for the protocol generator — demonstrates the full 4-step engine lifecycle:
# auto service fetch → agent step → auto handler → human gate.
id: multi-step-demo
name: Multi-Step Demo
version: 1
initial_state: created

params_schema:
  type: object
  required: [candidates]
  properties:
    candidates:
      type: array
      description: 'Extracted field candidates to validate'

protocol:
  quick_start: "Call start_run with workflow_id 'multi-step-demo'. The engine runs fetch_document automatically. You execute extract_fields by calling execute_step with command 'extract_fields' and your extracted candidates. The engine validates them, then pauses at finalize for human approval."
  rules:
    - "At extract_fields, extract candidates from the document text in the previous step's data. Submit them using execute_step."
    - 'At finalize, show the validation summary to the user before calling submit_human_response.'
    - 'Include a verbatim_quote for every candidate you extract.'

services:
  source:
    adapter: google_docs
    auth:
      token_from: secrets.GDOCS_TOKEN
    trust: engine_delivered

steps:
  fetch_document:
    description: Fetch the target document from Google Docs
    execution: auto
    uses_service: source
    allowed_from_states: [created]
    produces_state: document_ready
    instructions: 'Engine handles this automatically. No action needed.'

  extract_fields:
    description: Extract field candidates from the document text
    execution: agent
    allowed_from_states: [document_ready]
    produces_state: fields_extracted
    instructions: "Extract field candidates from the document text. Submit them as 'candidates' — an array of objects with field_id, value, and verbatim_quote."
    input_schema:
      type: object
      required: [candidates]
      properties:
        candidates:
          type: array

  validate_candidates:
    description: Validate extracted quote citations against source document
    execution: auto
    handler: validate_verbatim_quotes
    allowed_from_states: [fields_extracted]
    produces_state: validated
    instructions: 'Engine validates your citations automatically. No action needed.'

  finalize:
    description: Human reviews and approves validated fields
    execution: auto
    trust: human_confirmed
    allowed_from_states: [validated]
    produces_state: completed
    instructions: 'Show the validation results to the user and ask for their approval or rejection.'

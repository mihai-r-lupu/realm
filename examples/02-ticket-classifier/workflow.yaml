# examples/02-ticket-classifier/workflow.yaml
# Support Ticket Classifier — reads a raw support ticket from disk, extracts
# ticket identity in one step, then classifies using the verified identity in
# a second step.
#
# Demonstrates: chained agent steps where step 2 reads step 1's validated output
# via context.resources. The classifier cannot receive bad extraction data —
# identify_ticket's schema is enforced before classify_ticket starts.
id: ticket-classifier
name: Support Ticket Classifier
version: 1

params_schema:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: 'Path to the support ticket text file'

services:
  tickets:
    adapter: filesystem
    trust: engine_delivered

steps:
  read_ticket:
    description: Load the support ticket from disk
    execution: auto
    depends_on: []
    trust: engine_delivered
    uses_service: tickets
    operation: read
    input_map:
      path: run.params.path

  identify_ticket:
    description: >
      Extract structured identity fields from the raw ticket text. Output is
      validated before classify_ticket starts — the classifier cannot receive
      incomplete or malformed extraction data.
    execution: agent
    depends_on: [read_ticket]
    prompt: |
      Extract identity fields from the support ticket below.

      Required fields:
      - customer_id: the customer ID, format CUST-NNNN
      - product_area: the product or service area this ticket concerns
        (e.g. "billing", "payment gateway", "account management", "API")
      - product_version: the software version mentioned, or "unknown" if not stated
      - reported_issue: one sentence describing the problem as reported
        (10–300 characters)

      Return exactly these four fields. Any field missing or using an invalid
      format will be rejected before this response is accepted.

      Ticket:
      {{ context.resources.read_ticket.content }}
    input_schema:
      type: object
      required: [customer_id, product_area, product_version, reported_issue]
      properties:
        customer_id:
          type: string
          pattern: '^CUST-[0-9]{4}$'
        product_area:
          type: string
          minLength: 2
          maxLength: 80
        product_version:
          type: string
          minLength: 1
          maxLength: 40
        reported_issue:
          type: string
          minLength: 10
          maxLength: 300

  classify_ticket:
    description: >
      Classify the ticket using the identity extracted by identify_ticket.
      The classifier receives verified, schema-validated data — the product area
      and reported issue are already confirmed before this step starts.
    execution: agent
    depends_on: [identify_ticket]
    prompt: |
      Classify this {{ context.resources.identify_ticket.product_area }} support ticket.

      Reported issue: {{ context.resources.identify_ticket.reported_issue }}

      Required fields:
      - category: one of bug | feature_request | billing | account | other
      - priority: one of low | medium | high | critical
      - one_line_summary: one sentence for the support queue (min 10 chars)

      Return exactly these three fields. Any value outside the allowed enums
      will be rejected before your response is accepted.
    input_schema:
      type: object
      required: [category, priority, one_line_summary]
      properties:
        category:
          type: string
          enum: [bug, feature_request, billing, account, other]
        priority:
          type: string
          enum: [low, medium, high, critical]
        one_line_summary:
          type: string
          minLength: 10

  record_ticket:
    description: Record the classified ticket
    execution: auto
    depends_on: [classify_ticket]

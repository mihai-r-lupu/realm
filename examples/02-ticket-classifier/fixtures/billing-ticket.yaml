name: billing inquiry — double charge on March invoice
params:
  path: /fake/tickets/billing-overcharge.txt
mocks:
  tickets:
    read:
      status: 200
      data:
        path: /fake/tickets/billing-overcharge.txt
        content: |
          CUST-1122 — Incorrect Invoice — Double Charge

          Customer: CUST-1122
          Reported: 2026-04-09

          We were charged twice for our March invoice — once on March 1 and again
          on March 31. The duplicate charge was $499.00. Please issue a refund and

# examples/07-issue-triage/workflow.yaml
# Issue Triage — fetches a GitHub issue, triages it with an LLM agent, pauses for
# human approval, then posts a comment and applies labels if approved.
#
# Demonstrates: GitHubAdapter (get_issue, post_comment, apply_labels), agent step
# with human gate, parallel write steps with when-condition routing on gate choice,
# resolution_messages for both approval paths.
id: issue-triage
name: Issue Triage
version: 1

params_schema:
  type: object
  properties:
    repo:
      type: string
      description: 'GitHub repository in owner/repo format (e.g. acme/api-service)'
    issue_number:
      type: integer
      description: 'The GitHub issue number to triage'
  required: [repo, issue_number]

services:
  github:
    adapter: github
    trust: engine_delivered
    config:
      base_url: 'https://api.github.com'

steps:
  fetch_issue:
    description: Fetch the issue details from GitHub
    execution: auto
    depends_on: []
    uses_service: github
    service_method: fetch
    operation: get_issue
    input_map:
      repo: run.params.repo
      issue_number: run.params.issue_number

  triage_issue:
    description: >
      Classify the issue severity and draft a triage comment. Pauses for human
      approval — the agent's output (severity, labels, comment_draft) is displayed
      to the reviewer before any writes reach GitHub.
    execution: agent
    depends_on: [fetch_issue]
    trust: human_confirmed
    prompt: |
      Triage GitHub issue #{{ run.params.issue_number }} in {{ run.params.repo }}.

      ISSUE
      Title: {{ context.resources.fetch_issue.title }}
      Body:
      {{ context.resources.fetch_issue.body }}

      Classify the issue and draft a triage comment. Output:
      - severity: one of critical, high, medium, low
      - labels: array of label strings (e.g. ["bug", "P1"])
      - comment_draft: the comment to post on the issue if this triage is approved
    input_schema:
      type: object
      properties:
        severity:
          type: string
          enum: [critical, high, medium, low]
        labels:
          type: array
          items:
            type: string
        comment_draft:
          type: string
      required: [severity, labels, comment_draft]
    display: |
      Severity: {{ severity }}
      Labels: {{ labels }}
      Comment: {{ comment_draft }}
    gate:
      choices: [approve, reject]
      resolution_messages:
        approve: 'Approved — comment and labels will be posted to the issue.'
        reject: 'Rejected — no writes posted to GitHub.'

  post_comment:
    description: Post the approved triage comment on the GitHub issue
    execution: auto
    depends_on: [triage_issue]
    when: "triage_issue.choice == 'approve'"
    uses_service: github
    service_method: create
    operation: post_comment
    input_map:
      repo: run.params.repo
      issue_number: run.params.issue_number
      body: context.resources.triage_issue.comment_draft

  apply_labels:
    description: Apply the triage labels to the GitHub issue
    execution: auto
    depends_on: [triage_issue]
    when: "triage_issue.choice == 'approve'"
    uses_service: github
    service_method: create
    operation: apply_labels
    input_map:
      repo: run.params.repo
      issue_number: run.params.issue_number
      labels: context.resources.triage_issue.labels

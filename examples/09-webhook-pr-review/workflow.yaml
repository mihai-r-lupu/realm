# Example 09 — Webhook PR Review
# Triggered by GitHub pull_request:opened or pull_request:synchronize events.
# Use `realm webhook` to receive and dispatch these events.
id: webhook-pr-review
name: Webhook PR Review
version: 1
description: >
  Reviews a GitHub pull request using MCP tools, pauses for human approval,
  then posts the approved review as a GitHub comment.

params_schema:
  type: object
  required:
    - pr_number
    - repo
    - repo_owner
    - repo_name
    - pr_title
    - head_sha
    - pr_url
    - author
    - pr_action
    - github_delivery_id
  properties:
    pr_number: { type: integer }
    repo: { type: string, description: 'Full repository name in owner/repo format' }
    repo_owner: { type: string }
    repo_name: { type: string }
    pr_title: { type: string }
    head_sha: { type: string }
    base_sha: { type: string }
    pr_url: { type: string }
    author: { type: string }
    pr_action: { type: string }
    github_delivery_id: { type: string }

services:
  github:
    adapter: github
    trust: engine_delivered
    auth:
      token_from: secrets.GITHUB_TOKEN
    config:
      base_url: 'https://api.github.com'

mcp_servers:
  - id: github
    transport: stdio
    command: npx
    args:
      - -y
      - '@modelcontextprotocol/server-github'
    env:
      GITHUB_TOKEN: '${GITHUB_TOKEN}'

steps:
  fetch_pr:
    description: >
      Retrieve the full diff, list of changed files, and any inline review comments
      already present on this PR. Capture the content needed to assess the change.
    execution: agent
    tools:
      - 'github:get_pull_request'
      - 'github:get_pull_request_files'
    max_tool_calls: 10
    tool_timeout: 30
    input_schema:
      type: object
      required: [diff_summary, changed_files]
      properties:
        diff_summary: { type: string }
        changed_files: { type: array, items: { type: string } }

  analyze_changes:
    description: >
      Using the diff and file list from fetch_pr, analyze the change for correctness,
      style, test coverage, and security concerns. Draft a concise review comment
      (max 500 words) that summarizes findings and any blocking issues.
    execution: agent
    depends_on: [fetch_pr]
    tools:
      - 'github:get_pull_request'
    max_tool_calls: 5
    tool_timeout: 30
    input_schema:
      type: object
      required: [review_body]
      properties:
        review_body: { type: string }
        blocking_count: { type: integer }
        suggestion_count: { type: integer }

  approve_review:
    description: >
      Present the drafted review to a human reviewer. They may approve it for posting
      or reject it to discard this run without commenting on the PR.
    execution: auto
    depends_on: [analyze_changes]
    trust: human_confirmed
    gate:
      choices: [approve, reject]
      message: |
        PR #{{ run.params.pr_number }} — {{ run.params.repo }}
        Title: {{ run.params.pr_title }}
        Author: {{ run.params.author }}

        Drafted review:
        {{ context.resources.analyze_changes.review_body }}
      resolution_messages:
        approve: '✅ Review approved — posting to GitHub PR.'
        reject: '❌ Review rejected — run will not continue.'

  post_review:
    description: Post the approved review body as a PR review comment on GitHub.
    execution: auto
    depends_on: [approve_review]
    when: "approve_review.choice == 'approve'"
    uses_service: github
    service_method: create
    operation: post_comment
    input_map:
      repo: run.params.repo
      pr_number: run.params.pr_number
      body: context.resources.analyze_changes.review_body

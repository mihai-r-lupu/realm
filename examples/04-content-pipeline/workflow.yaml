# examples/04-content-pipeline/workflow.yaml
# Content Enrichment Pipeline — reads an article from disk, summarises it, tags it using
# the verified summary, then records the result. Demonstrates: DAG execution model +
# realm run resume. When the provider times out at tag_content, fetch_content and summarise
# are already in completed_steps — realm run resume continues from tag_content without
# re-running anything.
id: content-pipeline
name: Content Enrichment Pipeline
version: 1

params_schema:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: 'Path to the article text file'

services:
  articles:
    adapter: filesystem
    trust: engine_delivered

steps:
  fetch_content:
    description: Load article text from disk
    execution: auto
    depends_on: []
    trust: engine_delivered
    uses_service: articles
    operation: read
    input_map:
      path: run.params.path

  summarise:
    description: >
      Summarise the article. Produces title, summary, and word_count — all validated
      before tag_content starts. The tagger cannot receive a malformed summary.
    execution: agent
    depends_on: [fetch_content]
    prompt: |
      Summarise the article below.

      Required fields:
      - title: the article title or a concise descriptive title (5–200 characters)
      - summary: a 2–5 sentence summary of the article's key points (20–500 characters)
      - word_count: estimated word count as an integer (must be at least 1)

      Return exactly these three fields. Any missing or invalid field will be rejected
      before this response is accepted.

      Article:
      {{ context.resources.fetch_content.content }}
    input_schema:
      type: object
      required: [title, summary, word_count]
      properties:
        title:
          type: string
          minLength: 5
          maxLength: 200
        summary:
          type: string
          minLength: 20
          maxLength: 500
        word_count:
          type: integer
          minimum: 1

  tag_content:
    description: >
      Generate tags for the article using the verified summary from summarise.
      The tagger receives schema-validated data — it cannot receive a bad summary.
      This is the step that provider timeouts target in the resume-after-timeout fixture.
    execution: agent
    depends_on: [summarise]
    prompt: |
      Generate tags for this article.

      Title: {{ context.resources.summarise.title }}
      Word count: {{ context.resources.summarise.word_count }}
      Summary: {{ context.resources.summarise.summary }}

      Required fields:
      - headline: article title followed by word count.
        Example: "Building Reliable ML Infrastructure — 210 words"
      - message: full tagging result. Use this exact layout — a blank line between each section:

          Summary: <the article summary, one paragraph>

          Tags: tag1, tag2, tag3
          (1–10 tags, lowercase, hyphens for multi-word, e.g. machine-learning)

      Return exactly these two fields. Any tag outside the format constraints will be rejected.
    input_schema:
      type: object
      required: [headline, message]
      properties:
        headline:
          type: string
          description: 'Article title and word count'
          minLength: 5
        message:
          type: string
          description: 'Full result with Summary and Tags sections'
          minLength: 20

  record_result:
    description: Mark the pipeline complete. Data is already in the evidence chain from
      summarise and tag_content — this step exists to give the pipeline a clean terminal
      step distinct from the final agent step.
    execution: auto
    depends_on: [tag_content]

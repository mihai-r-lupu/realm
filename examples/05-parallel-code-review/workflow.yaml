# examples/05-parallel-code-review/workflow.yaml
# Parallel Code Review — reads a diff from disk, fans out to a security specialist and a
# performance specialist simultaneously, then converges in a synthesizer step that combines
# both reviews into a single verdict. Demonstrates: DAG fan-out (two steps eligible at once),
# independent per-branch input_schema enforcement, and convergence via depends_on: [a, b].
id: parallel-code-review
name: Parallel Code Review
version: 1

params_schema:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: 'Path to the diff file to review'

workflow_context:
  reviewer_guidelines:
    source:
      path: guidelines/reviewer-guidelines.md
    description: 'Shared risk level definitions and finding format used by both specialists'

services:
  diffs:
    adapter: filesystem
    trust: engine_delivered

steps:
  read_diff:
    description: Load the diff from disk
    execution: auto
    depends_on: []
    trust: engine_delivered
    uses_service: diffs
    operation: read
    input_map:
      path: run.params.path

  review_security:
    description: >
      Identify security vulnerabilities in the diff. Produces findings[], risk_level, and
      confidence. Schema-enforced before synthesize_review starts — the synthesizer cannot
      receive a malformed security review.
    execution: agent
    depends_on: [read_diff]
    prompt: |
      You are a security specialist reviewing a code diff.

      Review standards:
      {{ workflow.context.reviewer_guidelines }}

      Diff to review:
      {{ context.resources.read_diff.content }}

      Required fields:
      - findings: list of security issues found (each entry: function/location + one-sentence issue)
        If no issues are found, return an empty list.
      - risk_level: overall security risk ('low', 'medium', 'high', or 'critical')
      - confidence: your confidence in this assessment as a decimal between 0.0 and 1.0

      Return exactly these three fields. Any missing or invalid field will be rejected.
    input_schema:
      type: object
      required: [findings, risk_level, confidence]
      properties:
        findings:
          type: array
          items:
            type: string
        risk_level:
          type: string
          enum: [low, medium, high, critical]
        confidence:
          type: number
          minimum: 0
          maximum: 1

  review_performance:
    description: >
      Identify performance problems in the diff. Produces findings[], risk_level, and
      confidence. Schema-enforced before synthesize_review starts — the synthesizer cannot
      receive a malformed performance review.
    execution: agent
    depends_on: [read_diff]
    prompt: |
      You are a performance specialist reviewing a code diff.

      Review standards:
      {{ workflow.context.reviewer_guidelines }}

      Diff to review:
      {{ context.resources.read_diff.content }}

      Required fields:
      - findings: list of performance issues found (each entry: function/location + one-sentence issue)
        If no issues are found, return an empty list.
      - risk_level: overall performance risk ('low', 'medium', 'high', or 'critical')
      - confidence: your confidence in this assessment as a decimal between 0.0 and 1.0

      Return exactly these three fields. Any missing or invalid field will be rejected.
    input_schema:
      type: object
      required: [findings, risk_level, confidence]
      properties:
        findings:
          type: array
          items:
            type: string
        risk_level:
          type: string
          enum: [low, medium, high, critical]
        confidence:
          type: number
          minimum: 0
          maximum: 1

  synthesize_review:
    description: >
      Combine the security and performance reviews into a single verdict. Both upstream
      reviews are already schema-validated — the synthesizer receives confirmed, structured
      data from both branches.
    execution: agent
    depends_on: [review_security, review_performance]
    prompt: |
      Combine the two specialist reviews below into a single verdict.

      Security review:
      - Risk level: {{ context.resources.review_security.risk_level }}
      - Confidence: {{ context.resources.review_security.confidence }}
      - Findings:
        {% for finding in context.resources.review_security.findings %}
        - {{ finding }}
        {% endfor %}

      Performance review:
      - Risk level: {{ context.resources.review_performance.risk_level }}
      - Confidence: {{ context.resources.review_performance.confidence }}
      - Findings:
        {% for finding in context.resources.review_performance.findings %}
        - {{ finding }}
        {% endfor %}

      Required fields:
      - agreed_risk_level: the higher of the two risk levels ('low', 'medium', 'high', or 'critical')
      - security_concerns: a 1–3 sentence summary of the most important security findings
        (write "None identified." if the security findings list was empty)
      - performance_concerns: a 1–3 sentence summary of the most important performance findings
        (write "None identified." if the performance findings list was empty)
      - recommendation: one sentence stating whether this diff should be approved, revised, or blocked

      Return exactly these four fields.
    input_schema:
      type: object
      required: [agreed_risk_level, security_concerns, performance_concerns, recommendation]
      properties:
        agreed_risk_level:
          type: string
          enum: [low, medium, high, critical]
        security_concerns:
          type: string
          minLength: 1
        performance_concerns:
          type: string
          minLength: 1
        recommendation:
          type: string
          minLength: 10

  record_review:
    description: >
      Mark the review complete. All findings are already in the evidence chain from
      review_security, review_performance, and synthesize_review — this step exists to give
      the workflow a clean terminal step distinct from the final agent step.
    execution: auto
    depends_on: [synthesize_review]

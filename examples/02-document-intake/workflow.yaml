id: document-intake
name: "Document Intake"
version: 1
initial_state: created

steps:
  read_document:
    description: "Read the intake document from the file system."
    execution: auto
    uses_service: source
    operation: read
    allowed_from_states: [created]
    produces_state: document_ready

  extract_fields:
    description: "Extract required fields from the document."
    execution: agent
    allowed_from_states: [document_ready, revision_requested]
    produces_state: fields_extracted
    prompt: |
      Extract the following required fields from the document:
      - title: the document's title or subject line
      - author: the name of the document's author
      - date: the document date in YYYY-MM-DD format
      - summary: a one-paragraph summary of the document's content

      {{ context.resources.read_document.content }}
    input_schema:
      type: object
      required: [title, author, date, summary]
      properties:
        title: { type: string }
        author: { type: string }
        date: { type: string, pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}$" }
        summary: { type: string }
        revision_notes:
          type: string
          description: "If this is a revision, briefly explain what was corrected."

  validate_fields:
    description: "Validate that all required fields meet quality requirements."
    execution: auto
    handler: validate_intake_fields
    allowed_from_states: [fields_extracted]
    produces_state: validated
    transitions:
      on_error:
        step: extract_fields
        produces_state: revision_requested

  confirm_submission:
    description: "Human reviewer approves or rejects the extracted fields."
    execution: auto
    trust: human_confirmed
    allowed_from_states: [validated]
    produces_state: submitted
    prompt: |
      Please review the extracted fields before submission:

      - Title: {{ context.resources.extract_fields.title }}
      - Author: {{ context.resources.extract_fields.author }}
      - Date: {{ context.resources.extract_fields.date }}
      - Summary: {{ context.resources.extract_fields.summary }}

      Approve to submit, or reject to send back for revision.
    instructions: |
      Present the fields above to the user verbatim. Ask them to approve or reject.
      Collect their choice and call submit_human_response.
    gate:
      choices: [approve, reject]
    transitions:
      on_reject:
        step: extract_fields
        produces_state: revision_requested

  submit_record:
    description: "Record the approved intake document."
    execution: auto
    allowed_from_states: [submitted]
    produces_state: completed

services:
  source:
    adapter: filesystem
    trust: engine_delivered

params_schema:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: "Absolute path to the intake document."

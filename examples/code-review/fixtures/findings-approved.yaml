name: findings-approved
params:
  code: |
    function getUser(userId) {
      const query = `SELECT * FROM users WHERE id = '${userId}'`;
      db.run(query);
    }
agent_responses:
  review_security:
    findings:
      - severity: critical
        description: SQL injection vulnerability — user input interpolated directly into SQL query
        location: "line 2: template literal in query string"
      - severity: medium
        description: No input validation or sanitisation before database call
        location: "line 3: db.run call"
  assess_quality:
    findings:
      - category: error-handling
        description: No error handling around the database call
        suggestion: Wrap db.run in a try/catch and handle errors explicitly
      - category: naming
        description: Parameter name 'userId' is fine but function has no return value documented
        suggestion: Add JSDoc and document that function returns a Promise or is fire-and-forget
      - category: maintainability
        description: Direct string interpolation in SQL strings is a structural smell regardless of intent
        suggestion: Use parameterized queries via db.prepare() or a query builder
    overall_risk: high
gate_responses:
  confirm_review: approve
expected:
  final_state: completed
  evidence:
    - step_id: review_security
      status: success
    - step_id: assess_quality
      status: success
    - step_id: confirm_review
      status: success

name: findings-rejected
params:
  code: |
    function runScript(req) {
      eval(req.body.script);
    }
agent_responses:
  review_security:
    findings:
      - severity: critical
        description: Remote code execution — eval() executes arbitrary user-supplied input
        location: "line 2: eval(req.body.script)"
  assess_quality:
    findings:
      - category: security
        description: eval() with user input is never acceptable in production code
        suggestion: Remove eval() entirely; redesign the feature without dynamic code execution
    overall_risk: high
gate_responses:
  confirm_review: reject
expected:
  final_state: completed
  evidence:
    - step_id: review_security
      status: success
    - step_id: assess_quality
      status: success
    - step_id: confirm_review
      status: success

name: vulnerable-file
params:
  path: /home/mihai/code/realm/packages/core/src/adapters/http-adapter.ts
agent_responses:
  review_security:
    findings:
      - severity: high
        owasp_category: "A10 Server-Side Request Forgery"
        location: "constructor, base_url assignment"
        description: The base_url is accepted from caller-supplied config without URL validation, enabling SSRF if an attacker controls the configuration.
        remediation: Validate base_url against an allowlist of trusted origins before use.
      - severity: medium
        owasp_category: "A02 Cryptographic Failures"
        location: "buildAuthHeaders(), token handling"
        description: Bearer tokens are base64-encoded but not validated for format or minimum length before inclusion in headers.
        remediation: Validate token presence and format, and enforce a minimum length before constructing the Authorization header.
  assess_quality:
    findings:
      - category: error-handling
        description: Network errors are caught and rethrown but the HTTP error response body is not read, losing diagnostic information for debugging.
        suggestion: Call response.text() in the error path and include the body in the WorkflowError message.
        location: "request() — HTTP error handling block"
      - category: architecture
        description: The request() private method handles three different HTTP methods via a string discriminant, growing more complex with each new method.
        suggestion: Extract a shared body-building helper to isolate GET vs body-based method differences.
        location: "request() method"
    overall_risk: high
    summary: "GenericHttpAdapter has SSRF and credential handling concerns that require remediation before production use. Error handling is functional but loses diagnostic context on failure, reducing debuggability."
gate_responses:
  confirm_review: reject
expected:
  final_state: completed
  evidence:
    - step_id: read_code
      status: success
    - step_id: review_security
      status: success
    - step_id: assess_quality
      status: success
    - step_id: confirm_review
      status: success

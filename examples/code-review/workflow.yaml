# examples/code-review/workflow.yaml
# File-Aware Structured Code Reviewer — reads a file from disk, runs security
# and quality analysis via agent steps, then asks the human for approval.
# Demonstrates: service adapter (filesystem), agent step schemas, human gate.
id: code-review
name: Structured Code Review
version: 2
initial_state: created

params_schema:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: "Absolute path to the source file to review"

services:
  filesystem:
    adapter: filesystem
    trust: engine_delivered

steps:
  read_code:
    description: Load source file contents from disk for analysis
    execution: auto
    trust: engine_delivered
    uses_service: filesystem
    operation: read
    allowed_from_states: [created]
    produces_state: code_loaded

  review_security:
    description: Analyze code for security vulnerabilities against OWASP Top 10
    execution: agent
    agent_profile: security-reviewer
    allowed_from_states: [code_loaded]
    produces_state: security_reviewed
    prompt: |
      You are a senior security engineer performing a formal code review.

      Analyze the code below against the OWASP Top 10 (2021):
        A01 Broken Access Control
        A02 Cryptographic Failures
        A03 Injection (SQL, command, LDAP, XPath, template injection)
        A04 Insecure Design
        A05 Security Misconfiguration
        A06 Vulnerable and Outdated Components
        A07 Identification and Authentication Failures
        A08 Software and Data Integrity Failures
        A09 Security Logging and Monitoring Failures
        A10 Server-Side Request Forgery

      For each finding:
      - Assign a severity: critical, high, medium, or low
      - Cite the OWASP category it falls under
      - Identify the exact location (file line or function name)
      - Write a one-sentence description of the vulnerability
      - Write a one-sentence remediation guidance

      If no vulnerability is found for a category, do not invent one.
      If the file has no security findings at all, return an empty findings array.

      File: {{ run.params.path }}

      ```
      {{ context.resources.read_code.content }}
      ```
    input_schema:
      type: object
      required: [findings]
      properties:
        findings:
          type: array
          items:
            type: object
            required: [severity, owasp_category, location, description, remediation]
            properties:
              severity:
                type: string
                enum: [critical, high, medium, low]
              owasp_category:
                type: string
              location:
                type: string
              description:
                type: string
              remediation:
                type: string

  assess_quality:
    description: Assess code quality — architecture, maintainability, correctness, and test coverage
    execution: agent
    agent_profile: quality-reviewer
    allowed_from_states: [security_reviewed]
    produces_state: quality_assessed
    prompt: |
      You are a senior software engineer performing a code quality review.

      The file below has already been reviewed for security. Do not repeat security findings.

      Assess the code for:
      - Architecture and design: separation of concerns, coupling, cohesion
      - Naming: clarity, consistency, use of conventions
      - Error handling: completeness, specificity, silent failures
      - Maintainability: code duplication, complexity, readability
      - Test coverage: missing tests, poor test isolation, untested edge cases
      - Dead code: unreachable branches, commented-out blocks, unused exports

      For each finding:
      - Assign a category (one of: architecture, naming, error-handling, maintainability, test-coverage, dead-code, other)
      - Describe the issue in one sentence
      - Provide a concrete improvement suggestion in one sentence
      - Cite the location (line or function)

      File: (The file content was provided to you via the read_code step context.)

      Security findings already identified (for context only — do not repeat):
      {{ context.resources.review_security.findings }}
    input_schema:
      type: object
      required: [findings, overall_risk, summary]
      properties:
        findings:
          type: array
          items:
            type: object
            required: [category, description, suggestion, location]
            properties:
              category:
                type: string
                enum: [architecture, naming, error-handling, maintainability, test-coverage, dead-code, other]
              description:
                type: string
              suggestion:
                type: string
              location:
                type: string
        overall_risk:
          type: string
          enum: [low, medium, high, critical]
          description: "Combined risk verdict across security and quality findings"
        summary:
          type: string
          description: "2-3 sentence executive summary of the review"

  confirm_review:
    description: Present the consolidated review report to the human for approval
    execution: auto
    trust: human_confirmed
    allowed_from_states: [quality_assessed]
    produces_state: completed
    gate:
      choices:
        - approve
        - reject
    prompt: |
      Code review complete for: {{ run.params.path }}

      EXECUTIVE SUMMARY
      {{ context.resources.assess_quality.summary }}

      SECURITY FINDINGS (OWASP Top 10)
      {{ context.resources.review_security.findings }}

      QUALITY FINDINGS
      {{ context.resources.assess_quality.findings }}

      Overall risk: {{ context.resources.assess_quality.overall_risk }}

      Reply with 'approve' to mark this review as complete, or 'reject' to flag it for re-review.
    instructions: |
      Present the display content to the user verbatim without modification. Ask for their choice
      from gate.response_spec.choices. Then call submit_human_response with run_id, gate_id, and
      the user's choice.

# examples/pr-review/workflow.yaml
# PR Review — fetches a GitHub pull request diff, asks an AI agent to write a
# structured summary, waits for human approval, then posts the summary to Slack.
#
# Demonstrates: GitHubAdapter (auto step), agent step with input_schema,
# human gate with two-branch routing via when: conditions, SlackAdapter (auto step),
# and the realm agent command.
#
# Run with: realm agent --workflow examples/pr-review --params '{"repo":"owner/repo","pr_number":42}'
id: pr-review
name: PR Review
version: 1

params_schema:
  type: object
  required: [repo, pr_number]
  properties:
    repo:
      type: string
      description: 'GitHub repository in owner/repo format'
    pr_number:
      type: integer
      description: 'Pull request number to review'

services:
  github:
    adapter: github
    trust: engine_delivered
  slack_notifications:
    adapter: slack
    trust: engine_delivered

steps:
  fetch_pr:
    description: Fetch the pull request file diff from GitHub.
    execution: auto
    depends_on: []
    uses_service: github
    service_method: fetch
    operation: get_pr_diff
    input_map:
      repo: run.params.repo
      pr_number: run.params.pr_number

  write_summary:
    description: >
      Review the pull request diff and produce a structured JSON summary with
      title (a one-line description of what the PR does), risk level (low/medium/high),
      key_changes (up to 5 bullet points), and a recommendation (approve/request_changes/discuss).
    execution: agent
    depends_on: [fetch_pr]
    prompt: |
      Review the following GitHub pull request and produce a structured summary.

      Repository: {{ run.params.repo }}
      PR number: {{ run.params.pr_number }}

      Changed files:
      {{ context.resources.fetch_pr }}

      Return a JSON object with these fields:
        - title: one-line summary of what the PR does
        - risk: one of "low", "medium", "high"
        - key_changes: array of up to 5 bullet-point strings
        - recommendation: one of "approve", "request_changes", "discuss"
    input_schema:
      type: object
      required: [title, risk, key_changes, recommendation]
      properties:
        title:
          type: string
          description: 'One-line summary of what the PR does'
        risk:
          type: string
          enum: [low, medium, high]
        key_changes:
          type: array
          items:
            type: string
          description: 'Up to 5 key changes, as bullet-point strings'
        recommendation:
          type: string
          enum: [approve, request_changes, discuss]

  human_review:
    description: Present the AI-generated PR summary to a human for approval before posting to Slack.
    execution: auto
    depends_on: [write_summary]
    trust: human_confirmed
    gate:
      choices:
        - approve
        - reject
      message: |
        PR #{{ run.params.pr_number }} — {{ context.resources.write_summary.title | truncate: 60 }}
        Risk: {{ context.resources.write_summary.risk | upper }} | AI: {{ context.resources.write_summary.recommendation | truncate: 80 }}

        {{ context.resources.write_summary.key_changes | limit: 5 | bullets }}

  post_to_slack:
    description: Post the approved PR summary title to the team Slack channel.
    execution: auto
    depends_on: [human_review]
    when: "human_review.choice == 'approve'"
    uses_service: slack_notifications
    service_method: create
    operation: post_message
    input_map:
      text: context.resources.write_summary.title

  notify_rejection:
    description: Notify the team that the PR review was rejected.
    execution: auto
    depends_on: [human_review]
    when: "human_review.choice == 'reject'"
    uses_service: slack_notifications
    service_method: create
    operation: post_message
    input_map:
      text: context.resources.write_summary.title
